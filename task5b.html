<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        .nav-demo {

        .nav-brand {
            color: white;
            font-weight: bold;
            font-size: 1.1em;
            padding: 12px 20px;
            margin: 0;
        }

        .nav-links {
            display: flex;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-demo li a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 5px 20px;
        }

        .nav-login {
            display: inline-block;
            padding: 5px 20px;
            background-color: rgba(135, 206, 235, 0.3);;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="nav-demo">
        <span class="nav-brand">LOGOBAKERY</span>
        <ul class="nav-links">
            <li><a href="#">Services</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">About</a></li>
        </ul>
        <a class="nav-login" href="#">Contact</a>
    </div>

    <div class="nav-demo">

        <ul class="nav-links">
            <li><a href="#">Services</a></li>

    </div>

    <div class="nav-demo">
        <p class="nav-brand">LOGOBAKERY</p>

            <li><a href="#">Projects</a></li>

        </ul>

    </div>

</body>

</html>
