<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web Design</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(to right, #1565c0, #0db8a8);
            color: white;
        }


        /* ── NAVBAR ─────────────────────────────────────────────── */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            align-items: flex-end;   /* aligns all lines to the right */
            gap: 5px;
            cursor: pointer;
        }
        .hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: white;
            border-radius: 2px;
        }
        .hamburger span:nth-child(2) {
            width: 16px;            
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 24px;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 0.9em;
        }
        .nav-links a:hover {
            opacity: 0.75;
        }

        .nav-contact {
            color: white;
            text-decoration: none;
            font-size: 0.9em;
            border: 1px solid rgba(255,255,255,0.6);
            padding: 7px 18px;
            border-radius: 20px;
        }
        .nav-contact:hover {
            background: rgba(255,255,255,0.15);
        }


        /* ── HERO ───────────────────────────────────────────────── */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 60px 40px 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .hero-text {
            flex: 1;
            max-width: 420px;
        }
        .hero-text h1 {
            font-size: 2.8em;
            line-height: 1.2;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .hero-text p {
            font-size: 0.9em;
            line-height: 1.7;
            color: rgba(255,255,255,0.8);
            margin-bottom: 32px;
        }
        .btn-portfolio {
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #0db8a8;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.9em;
        }
        .btn-portfolio:hover {
            background: rgba(255,255,255,0.85);
        }

        .hero-image img {
            max-width: 100%;
            max-height: 360px;
            object-fit: contain;
        }

    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <div class="nav-left">
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Service</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </div>
        <a class="nav-contact" href="#">Contact Us</a>
    </nav>

    <!-- HERO -->
    <div class="hero">

        <div class="hero-text">
            <h1>Simple<br>Web Design</h1>
            <p>
                Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
                Ut enim ad minim veniam.
            </p>
            <a class="btn-portfolio" href="#">Portfolio</a>
        </div>

        <div class="hero-image">
            <img src="web-development.png" alt="Hero illustration">
        </div>

    </div>

</body>
</html>
